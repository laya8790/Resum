<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Bootstrap Demo Site</title>

<!-- Bootstrap CSS -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
  <div class="container">
    <a class="navbar-brand">MySite</a>

    <button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#menu">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="menu">
      <ul class="navbar-nav ms-auto">
        <li class="nav-item"><a class="nav-link">Home</a></li>
        <li class="nav-item dropdown">
          <a class="nav-link dropdown-toggle" data-bs-toggle="dropdown">Services</a>
          <ul class="dropdown-menu">
            <li><a class="dropdown-item">Web Design</a></li>
            <li><a class="dropdown-item">Development</a></li>
          </ul>
        </li>
        <li class="nav-item"><a class="nav-link">Contact</a></li>
      </ul>
    </div>
  </div>
</nav>

<!-- ALERT -->
<div class="container mt-3">
  <div class="alert alert-success">
    Welcome to Bootstrap Website!
  </div>
</div>

<!-- GRID + CARDS -->
<div class="container mt-4">
  <div class="row">
    
    <div class="col-md-4">
      <div class="card">
        <div class="card-body">
          <h5>Card 1 <span class="badge bg-danger">New</span></h5>
          <p>Bootstrap card example</p>
          <button class="btn btn-primary">Read</button>
        </div>
      </div>
    </div>

    <div class="col-md-4">
      <div class="card">
        <div class="card-body">
          <h5>Card 2</h5>
          <p>Grid system used here</p>
          <button class="btn btn-success">View</button>
        </div>
      </div>
    </div>

    <div class="col-md-4">
      <div class="card">
        <div class="card-body">
          <h5>Card 3</h5>
          <p>Responsive layout</p>
          <button class="btn btn-warning">More</button>
        </div>
      </div>
    </div>

  </div>
</div>

<!-- TABS -->
<div class="container mt-5">
<ul class="nav nav-tabs">
  <li class="nav-item">
    <a class="nav-link active" data-bs-toggle="tab" href="#home">Home</a>
  </li>
  <li class="nav-item">
    <a class="nav-link" data-bs-toggle="tab" href="#profile">Profile</a>
  </li>
</ul>

<div class="tab-content border p-3">
  <div class="tab-pane fade show active" id="home">
    Home content here
  </div>
  <div class="tab-pane fade" id="profile">
    Profile content here
  </div>
</div>
</div>

<!-- COLLAPSE -->
<div class="container mt-4">
<button class="btn btn-info" data-bs-toggle="collapse" data-bs-target="#demo">
  Show More
</button>

<div id="demo" class="collapse mt-2">
  This is collapse content.
</div>
</div>

<!-- FORM -->
<div class="container mt-5">
<h3>Contact Form</h3>
<form>
  <div class="mb-3">
    <label>Name</label>
    <input type="text" class="form-control">
  </div>

  <div class="mb-3">
    <label>Email</label>
    <input type="email" class="form-control">
  </div>

  <button class="btn btn-primary">Submit</button>
</form>
</div>

<!-- BUTTONS -->
<div class="container mt-4 mb-5">
<button class="btn btn-primary">Primary</button>
<button class="btn btn-danger">Danger</button>
<button class="btn btn-success">Success</button>
</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
